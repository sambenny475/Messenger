<!doctype html>
<html>
  <head>
    <title>Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

    <style>
      body {
        background: #0f172a;
        margin: 0;
        font-family: Arial;
        display: flex;
        justify-content: center;
      }

      /* Main container */
      .chat-container {
        width: 100%;
        max-width: 500px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        background: #020617;
        border-left: 1px solid #1e293b;
        border-right: 1px solid #1e293b;
        border-radius: 15px;
        padding-bottom: 15px;
        padding-top: 15px;
      }

      /* Messages area */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
      }

      /* Individual message */
      .msg {
        background: #1fcf00;
        padding: 10px;
        margin: 8px 0;
        border-radius: 10px;
        max-width: 80%;
      }

      /* Input area */
      form {
        display: flex;
        padding: 10px;
        background: #020617;
        border-top: 1px solid #1e293b;
      }

      input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
      }

      button {
        margin-left: 10px;
        padding: 12px;
        background: #38bdf8;
        border: none;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <!-- messages + form -->

      <div id="messages">
        {% for msg in messages %}
        <div class="msg"><b>{{ msg[1] }}</b>: {{ msg[2] }}</div>
        {% endfor %}
      </div>

      <form id="form">
        <input id="input" placeholder="Type message..." autocomplete="off" />
        <button>Send</button>
      </form>
    </div>
    <script>
      var socket = io();

      document.getElementById("form").onsubmit = function (e) {
        e.preventDefault();
        var input = document.getElementById("input");

        if (input.value) {
          socket.send(input.value);
          input.value = "";
        }
      };

      socket.on("message", function (data) {
        var div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = "<b>" + data.user + "</b>: " + data.msg;
        document.getElementById("messages").appendChild(div);
      });
    </script>
  </body>
</html>
